<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Euro Transfer</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

<h1>Choisissez votre pays</h1>

<select>
<option>France</option>
<option>Belgique</option>
<option>Suisse</option>
</select>

<button>Continuer</button>

<h1>Code de sécurité</h1>

<p>Veuillez entrer votre code secret pour accéder au site.</p>

<input type="text" placeholder="Entrer le code">
<button>Continuer</button>

<div class="info">
<h3 id="clientName">Client</h3>
<h2 id="solde">0,00 €</h2>
<p>Solde disponible</p>
</div>

<h1>Informations bancaires</h1>

<div class="form">

<input type="text" placeholder="Nom">
<input type="text" placeholder="Prénom">
<input type="text" placeholder="Numéro IBAN">
<input type="text" placeholder="Nom de la banque">

<input type="text" placeholder="Montant">
<input type="text" placeholder="Code BIC / SWIFT">
<input type="text" placeholder="Motif de transaction">

<button>Valider</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
