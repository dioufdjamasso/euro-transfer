<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Version de test</title>
<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
  background:linear-gradient(180deg,#eef6ff 0%, #ddeeff 100%);
  padding:20px;
  color:#0f172a;
}
.container{max-width:430px;margin:auto;}
.card{
  background:rgba(255,255,255,.95);
  border-radius:28px;
  padding:26px;
  box-shadow:0 12px 30px rgba(37,99,235,.12);
  margin-bottom:20px;
}
.label{
  color:#64748b;
  font-size:14px;
  font-weight:600;
  margin-bottom:6px;
}
.value{font-size:24px;font-weight:700;}
.balance{font-size:48px;font-weight:800;margin-top:10px;}
.row{display:flex;gap:12px;margin-top:22px;}
.btn{
  width:100%;
  border:none;
  border-radius:18px;
  padding:16px;
  font-size:17px;
  font-weight:700;
  cursor:pointer;
}
.btn-primary{background:#2563eb;color:white;}
.btn-secondary{background:#eff6ff;color:#2563eb;}
input{
  width:100%;
  padding:16px;
  margin:8px 0;
  border:1px solid #dbe3ee;
  border-radius:16px;
  font-size:16px;
}
#login,#form{display:none}
#timer{color:#2563eb;text-align:center;font-weight:700;padding:10px 0;}
#msg{color:#dc2626;text-align:center;font-weight:700;padding:8px 0;}
.footer{
  text-align:center;
  color:#64748b;
  font-size:12px;
  margin-top:16px;
}
</style>
</head>
<body>

<div class="container">

  <div id="home">
    <div class="card">
      <div class="label">Identifiant</div>
      <div class="value">DE89 3704 0044 0532 0130 00</div>

      <div class="label" style="margin-top:18px">Solde disponible</div>
      <div class="balance">3.178,00 €</div>

      <div class="row">
        <button class="btn btn-primary">Montant disponible</button>
        <button class="btn btn-secondary">Détails</button>
      </div>
    </div>

    <div class="card">
      <button class="btn btn-primary" onclick="openLogin()">Retirer</button>
    </div>
  </div>

  <div id="login" class="card">
    <h2>Connexion test</h2>
    <input id="code" placeholder="Code : 1234">
    <button class="btn btn-primary" onclick="checkCode()">Entrer</button>
    <button class="btn btn-secondary" onclick="goHome()">Retour</button>
  </div>

  <div id="form" class="card">
  <h2>Virement (version de test)</h2>

  <input placeholder="Nom du bénéficiaire">
  <input placeholder="IBAN">
  <input placeholder="Code BIC / SWIFT">
  <input placeholder="Montant">
  <input placeholder="Devise">
  <input placeholder="Motif du virement">

  <div id="timer"></div>
  <div id="msg"></div>

  <button class="btn btn-primary" onclick="startTimer()">Valider</button>
  <button class="btn btn-secondary" onclick="goHome()">Retour</button>
  </div>

<script>
function openLogin(){
  home.style.display='none';
  login.style.display='block';
}
function checkCode(){
  if(document.getElementById('code').value === '1234'){
    login.style.display='none';
    form.style.display='block';
  } else {
    alert('Code incorrect');
  }
}
function goHome(){
  home.style.display='block';
  login.style.display='none';
  form.style.display='none';
  timer.innerText='';
  msg.innerText='';
}
function startTimer(){
  let s=20;
  msg.innerText='';
  const t=setInterval(()=>{
    timer.innerText='⏳ Traitement... '+s+'s';
    s--;
    if(s<0){
      clearInterval(t);
      timer.innerText='';
      msg.innerText='Opération impossible';
    }
  },1000);
}
</script>

</body>
</html>
