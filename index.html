<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Démo bancaire</title>
<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#edf3f8;
  padding:20px;
}
.container{
  max-width:430px;
  margin:auto;
}
.card{
  background:white;
  border-radius:30px;
  padding:28px;
  box-shadow:0 8px 20px rgba(0,0,0,0.08);
  margin-bottom:25px;
}
.label{
  color:#98a1aa;
  font-size:28px;
}
.iban{
  font-size:34px;
  margin:20px 0;
}
.balance{
  font-size:72px;
  font-weight:bold;
}
.row{
  display:flex;
  gap:15px;
  margin-top:25px;
}
.btn{
  flex:1;
  border:none;
  border-radius:18px;
  padding:20px;
  font-size:20px;
  font-weight:bold;
  cursor:pointer;
}
.blue{
  background:#0a84ff;
  color:white;
}
.light{
  background:#e9f3fc;
  color:#0a84ff;
}
.withdraw{
  width:100%;
  border:none;
  background:white;
  text-align:left;
  font-size:42px;
  font-weight:bold;
  cursor:pointer;
}
input{
  width:100%;
  padding:15px;
  margin:8px 0;
  border:1px solid #ddd;
  border-radius:15px;
  font-size:17px;
  box-sizing:border-box;
}
#form,#login{display:none;}
#timer{
  color:#0a84ff;
  text-align:center;
  font-size:22px;
  font-weight:bold;
}
#msg{
  color:red;
  text-align:center;
  font-weight:bold;
}
</style>
</head>
<body>

<div class="container">

  <div id="home">
    <div class="card">
      <div class="label">IBAN</div>
      <div class="iban">DE00 1203 0000 1234 5678 90</div>

      <div class="label">Aktueller Kontostand</div>
      <div class="balance">3.178,00 €</div>

      <div class="row">
        <button class="btn blue">montant disponible</button>
        <button class="btn light">Kontodetails</button>
      </div>
    </div>

    <div class="card">
      <button class="withdraw" onclick="openLogin()">Retiré</button>
    </div>
  </div>

  <div id="login" class="card">
    <h2>Connexion démo</h2>
    <input id="code" placeholder="Code démo : demo123">
    <button class="btn blue" onclick="checkCode()">Entrer</button>
  </div>

  <div id="form" class="card">
    <h2>Formulaire de retrait</h2>
    <input placeholder="Nom">
    <input placeholder="Prénom">
    <input placeholder="Montant (modifiable)">
    <input placeholder="IBAN">
    <input placeholder="BIC">
    <input placeholder="Swift">
    <input placeholder="Nom de banque">

    <div id="timer"></div>
    <div id="msg"></div>

    <button class="btn blue" onclick="startTimer()">Valider</button>
  </div>

</div>

<script>
function openLogin(){
 document.getElementById("home").style.display="none";
 document.getElementById("login").style.display="block";
}
function checkCode(){
 let c=document.getElementById("code").value;
 if(c==="demo123"){
   document.getElementById("login").style.display="none";
   document.getElementById("form").style.display="block";
 }else{
   alert("Code incorrect");
 }
}
function startTimer(){
 let s=20;
 let t=setInterval(()=>{
   document.getElementById("timer").innerText="⏳ Traitement... "+s+"s";
   s--;
   if(s<0){
     clearInterval(t);
     document.getElementById("timer").innerText="";
     document.getElementById("msg").innerText="Transaction impossible";
   }
 },1000);
}
</script>

</body>
</html>
