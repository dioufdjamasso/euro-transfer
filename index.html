<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plateforme Démo</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f1f1f5;
padding:20px;
}

.box{
width:90%;
max-width:420px;
margin:40px auto;
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 4px 15px rgba(0,0,0,0.08);
}

h2{
margin-bottom:20px;
text-align:center;
}

input,select,button{
width:100%;
padding:15px;
margin-bottom:15px;
border:none;
border-radius:12px;
font-size:16px;
}

input,select{
background:#f4f4f4;
}

button{
background:#00a651;
color:white;
font-weight:bold;
cursor:pointer;
}

.card{
background:white;
border-radius:20px;
padding:25px;
text-align:center;
box-shadow:0 4px 15px rgba(0,0,0,0.08);
}

.balance{
font-size:52px;
font-weight:bold;
margin-top:20px;
}

.form{
margin-top:25px;
}

#countryPage,
#platform{
display:none;
}

</style>
</head>

<body>

<!-- CODE DEMO -->

<div class="box" id="loginPage">

<h2 id="pinTitle">
Code d'accès
</h2>

<input type="password"
id="pin"
placeholder="Entrez le code">

<button onclick="checkPin()" id="pinBtn">
CONTINUER
</button>

</div>

<!-- CHOIX PAYS -->

<div class="box" id="countryPage">

<h2 id="countryTitle">
Choisissez votre pays
</h2>

<select id="country">
<option value="fr">France</option>
<option value="de">Allemagne</option>
<option value="it">Italie</option>
<option value="ro">Roumanie</option>
<option value="es">Espagne</option>
<option value="pt">Portugal</option>
<option value="md">Moldavie</option>
</select>

<button onclick="openPlatform()" id="countryBtn">
VALIDER
</button>

</div>

<!-- PLATEFORME -->

<div id="platform">

<div class="card">

<h2 id="accountName">
Compte Premium
</h2>

<div class="balance">
45.473,92 €
</div>

<p id="availableText">
Solde disponible
</p>

</div>

<div class="box form">

<input type="text" id="benef" placeholder="Nom du bénéficiaire">

<input type="text" id="iban" placeholder="IBAN">

<input type="text" id="swift" placeholder="Code BIC / SWIFT">

<input type="number" id="amount" placeholder="Montant">

<select>
<option>EUR</option>
<option>USD</option>
<option>XOF</option>
</select>

<input type="text" id="motif" placeholder="Motif du virement">

<button id="validateBtn">
VALIDER
</button>

</div>

</div>

<script>

/* CODE DEMO */

const DEMO_CODE = "123456";

/* LANGUES */

const texts = {

fr:{
pinTitle:"Code d'accès",
pinPlaceholder:"Entrez le code",
pinBtn:"CONTINUER",
countryTitle:"Choisissez votre pays",
countryBtn:"VALIDER",
account:"Compte Premium",
available:"Solde disponible",
benef:"Nom du bénéficiaire",
swift:"Code BIC / SWIFT",
amount:"Montant",
motif:"Motif du virement",
validate:"VALIDER"
},

de:{
pinTitle:"Zugangscode",
pinPlaceholder:"Code eingeben",
pinBtn:"WEITER",
countryTitle:"Wählen Sie Ihr Land",
countryBtn:"BESTÄTIGEN",
account:"Premium Konto",
available:"Verfügbarer Kontostand",
benef:"Name des Empfängers",
swift:"BIC / SWIFT Code",
amount:"Betrag",
motif:"Überweisungsgrund",
validate:"BESTÄTIGEN"
},

it:{
pinTitle:"Codice di accesso",
pinPlaceholder:"Inserisci il codice",
pinBtn:"CONTINUA",
countryTitle:"Scegli il tuo paese",
countryBtn:"CONFERMA",
account:"Conto Premium",
available:"Saldo disponibile",
benef:"Nome del beneficiario",
swift:"Codice BIC / SWIFT",
amount:"Importo",
motif:"Motivo del bonifico",
validate:"CONFERMA"
},

ro:{
pinTitle:"Cod de acces",
pinPlaceholder:"Introduceți codul",
pinBtn:"CONTINUĂ",
countryTitle:"Alegeți țara",
countryBtn:"VALIDARE",
account:"Cont Premium",
available:"Sold disponibil",
benef:"Numele beneficiarului",
swift:"Cod BIC / SWIFT",
amount:"Sumă",
motif:"Motivul transferului",
validate:"VALIDARE"
},

es:{
pinTitle:"Código de acceso",
pinPlaceholder:"Ingrese el código",
pinBtn:"CONTINUAR",
countryTitle:"Seleccione su país",
countryBtn:"VALIDAR",
account:"Cuenta Premium",
available:"Saldo disponible",
benef:"Nombre del beneficiario",
swift:"Código BIC / SWIFT",
amount:"Monto",
motif:"Motivo de transferencia",
validate:"VALIDAR"
},

pt:{
pinTitle:"Código de acesso",
pinPlaceholder:"Digite o código",
pinBtn:"CONTINUAR",
countryTitle:"Escolha seu país",
countryBtn:"VALIDAR",
account:"Conta Premium",
available:"Saldo disponível",
benef:"Nome do beneficiário",
swift:"Código BIC / SWIFT",
amount:"Valor",
motif:"Motivo da transferência",
validate:"VALIDAR"
},

md:{
pinTitle:"Cod de acces",
pinPlaceholder:"Introduceți codul",
pinBtn:"CONTINUĂ",
countryTitle:"Alegeți țara",
countryBtn:"VALIDARE",
account:"Cont Premium",
available:"Sold disponibil",
benef:"Numele beneficiarului",
swift:"Cod BIC / SWIFT",
amount:"Sumă",
motif:"Motivul transferului",
validate:"VALIDARE"
}

};

let currentLang = "fr";

/* CODE */

function checkPin(){

const code = document.getElementById("pin").value;

if(code === DEMO_CODE){

document.getElementById("loginPage").style.display = "none";
document.getElementById("countryPage").style.display = "block";

}else{

alert("Code incorrect");

}

}

/* OUVRIR */

function openPlatform(){

currentLang = document.getElementById("country").value;

const t = texts[currentLang];

document.getElementById("countryPage").style.display = "none";
document.getElementById("platform").style.display = "block";

/* TEXTES */

document.getElementById("accountName").innerText = t.account;
document.getElementById("availableText").innerText = t.available;

document.getElementById("benef").placeholder = t.benef;
document.getElementById("swift").placeholder = t.swift;
document.getElementById("amount").placeholder = t.amount;
document.getElementById("motif").placeholder = t.motif;
document.getElementById("validateBtn").innerText = t.validate;

}



/* VALIDATION DEMO */

document.getElementById("validateBtn").onclick = function(){

const benef = document.getElementById("benef").value;
const iban = document.getElementById("iban").value;
const swift = document.getElementById("swift").value;
const amount = document.getElementById("amount").value;
const motif = document.getElementById("motif").value;

const confirmation = `
Bénéficiaire : ${benef}
IBAN : ${iban}
BIC/SWIFT : ${swift}
Montant : ${amount}
Motif : ${motif}

Ces informations sont-elles correctes ?`;

const ok = confirm(confirmation);

if(ok){

const oldContent = document.getElementById("platform").innerHTML;

document.getElementById("platform").innerHTML = `

<div class="box" style="text-align:center;">

<div style="
width:70px;
height:70px;
border:6px solid #ddd;
border-top:6px solid #00a651;
border-radius:50%;
animation:spin 1s linear infinite;
margin:20px auto;
"></div>

<p id="loadingText">
Traitement en cours...
</p>

</div>

<style>
@keyframes spin{
100%{
transform:rotate(360deg);
}
}
</style>

`;

setTimeout(function(){

document.getElementById("platform").innerHTML = `

<div class="box">

<h2 style="text-align:center; color:red;">
Demo Retrait impossible en route
</h2>

</div>

`;

},15000);

}

}

</script>

</body>
</html>
