<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Demo Platform</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#03142d;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
color:white;
}

.container{
width:100%;
max-width:420px;
background:#08244d;
padding:25px;
border-radius:20px;
}

h1{
font-size:30px;
margin-bottom:15px;
}

p{
margin-bottom:20px;
color:#d8d8d8;
}

input,
select,
button{
width:100%;
padding:15px;
border:none;
border-radius:12px;
margin-bottom:15px;
font-size:16px;
}

button{
background:#00b894;
color:white;
font-weight:bold;
cursor:pointer;
}

.hidden{
display:none;
}

.loader{
text-align:center;
font-size:22px;
padding:30px;
}

</style>

</head>

<body>

<div class="container">

<div id="page1">

<h1 id="title">
Bienvenue
</h1>

<p id="description">
Choisissez votre pays
</p>

<select onchange="changeLanguage(this.value)">

<option value="fr">France</option>
<option value="it">Italie</option>
<option value="de">Allemagne</option>
<option value="es">Espagne</option>
<option value="ro">Roumanie</option>
<option value="md">Moldavie</option>

</select>

<button id="btn"
onclick="showCode()">
Continuer
</button>

</div>

<div id="page2" class="hidden">

<h1>
Code secret
</h1>

<p>
Veuillez entrer votre code.
</p>

<input type="password"
id="secretCode"
placeholder="Code secret">

<button onclick="checkCode()">
Valider
</button>

</div>

<div id="page3" class="hidden">

<h1>
Informations
</h1>

<input type="text"
placeholder="Nom">

<input type="text"
placeholder="Prénom">

<input type="text"
placeholder="Pays">

<button onclick="confirmInfo()">
Valider
</button>

</div>

<div id="page4" class="hidden">

<h1>
Confirmation
</h1>

<p>
Veuillez vérifier vos informations.
</p>

<button onclick="startLoading()">
Continuer
</button>

</div>

<div id="loading"
class="hidden loader">

⏳ Traitement en cours...

</div>

<div id="finish"
class="hidden">

<h1>
DEMO TERMINÉE
</h1>

<p>
Merci d'avoir utilisé cette démonstration.
</p>

</div>

</div>

<script>

const translations = {

fr:{
title:"Bienvenue",
description:"Choisissez votre pays",
button:"Continuer"
},

it:{
title:"Benvenuto",
description:"Scegli il tuo paese",
button:"Continua"
},

de:{
title:"Willkommen",
description:"Wählen Sie Ihr Land",
button:"Weiter"
},

es:{
title:"Bienvenido",
description:"Seleccione su país",
button:"Continuar"
},

ro:{
title:"Bine ați venit",
description:"Selectați țara dvs",
button:"Continuă"
},

md:{
title:"Bine ați venit",
description:"Selectați țara dvs",
button:"Continuă"
}

};

function changeLanguage(lang){

document.getElementById("title").innerText =
translations[lang].title;

document.getElementById("description").innerText =
translations[lang].description;

document.getElementById("btn").innerText =
translations[lang].button;

}

function showCode(){

document.getElementById("page1")
.classList.add("hidden");

document.getElementById("page2")
.classList.remove("hidden");

}

function checkCode(){

const code =
document.getElementById("secretCode").value;

if(code === "911496"){

document.getElementById("page2")
.classList.add("hidden");

document.getElementById("page3")
.classList.remove("hidden");

}else{

alert("Code incorrect");

}

}

function confirmInfo(){

document.getElementById("page3")
.classList.add("hidden");

document.getElementById("page4")
.classList.remove("hidden");

}

function startLoading(){

document.getElementById("page4")
.classList.add("hidden");

document.getElementById("loading")
.classList.remove("hidden");

setTimeout(()=>{

document.getElementById("loading")
.classList.add("hidden");

document.getElementById("finish")
.classList.remove("hidden");

},15000);

}

</script>

</body>
</html>
