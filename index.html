<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prototype bancaire (Démo)</title>
  <style>
    body{
      font-family: Arial, sans-serif;
      background:#eef3f7;
      padding:20px;
      margin:0;
    }
    .container{
      max-width:420px;
      margin:auto;
    }
    .card{
      background:white;
      border-radius:24px;
      padding:24px;
      box-shadow:0 4px 16px rgba(0,0,0,.08);
      margin-bottom:20px;
    }
    h1{ font-size:42px; margin:0 0 20px; }
    .big{ font-size:54px; font-weight:bold; }
    button{
      width:100%;
      padding:16px;
      border:none;
      border-radius:18px;
      font-size:20px;
      margin-top:10px;
      cursor:pointer;
    }
    .blue{ background:#0a84ff; color:white; }
    .green{ background:#16a34a; color:white; }
    input{
      width:100%;
      padding:14px;
      margin:7px 0;
      border:1px solid #ccc;
      border-radius:14px;
      box-sizing:border-box;
      font-size:16px;
    }
    #login, #form { display:none; }
    #msg { color:red; font-weight:bold; text-align:center; }
    #timer { color:#0a84ff; font-weight:bold; text-align:center; }
    .note{
      text-align:center;
      color:#666;
      font-size:12px;
      margin-top:8px;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Girokonto</h1>

  <div id="home">
    <div class="card">
      <p>IBAN</p>
      <h2>DE00 1203 0000 1234 5678 90</h2>

      <p>Aktueller Kontostand</p>
      <div class="big">3.178,00 €</div>

      <button class="blue" onclick="openLogin()">Retiré</button>
      <div class="note">Prototype / Démonstration</div>
    </div>
  </div>

  <div id="login" class="card">
    <h2>Connexion (démo)</h2>
    <input id="code" placeholder="Code démo : demo123">
    <div id="loginMsg"></div>
    <button class="blue" onclick="checkCode()">Entrer</button>
    <button onclick="goHome()">Retour</button>
  </div>

  <div id="form" class="card">
    <h2>Formulaire de retrait</h2>
    <input placeholder="Nom">
    <input placeholder="Prénom">
    <input id="amount" placeholder="Montant (modifiable)">
    <input placeholder="IBAN">
    <input placeholder="BIC">
    <input placeholder="Swift">
    <input placeholder="Nom de banque">

    <div id="timer"></div>
    <div id="msg"></div>

    <button class="green" onclick="startTimer()">Valider</button>
    <button class="blue" onclick="goHome()">Retour</button>
  </div>
</div>

<script>
function openLogin(){
  document.getElementById('home').style.display='none';
  document.getElementById('login').style.display='block';
}

function checkCode(){
  const code = document.getElementById('code').value;
  if(code === 'demo123'){
    document.getElementById('login').style.display='none';
    document.getElementById('form').style.display='block';
  } else {
    document.getElementById('loginMsg').innerText='Code incorrect';
    document.getElementById('loginMsg').style.color='red';
  }
}

function goHome(){
  document.getElementById('home').style.display='block';
  document.getElementById('login').style.display='none';
  document.getElementById('form').style.display='none';
  document.getElementById('timer').innerText='';
  document.getElementById('msg').innerText='';
}

function startTimer(){
  let s = 20;
  document.getElementById('msg').innerText='';
  let t = setInterval(()=>{
    document.getElementById('timer').innerText='⏳ Traitement... ' + s + 's';
    s--;
    if(s < 0){
      clearInterval(t);
      document.getElementById('timer').innerText='';
      document.getElementById('msg').innerText='Transaction impossible';
    }
  },1000);
}
</script>

</body>
</html>
