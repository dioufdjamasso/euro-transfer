<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Virement Bancaire</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:0;
    background:#f2f2f2;
    font-family:Arial, sans-serif;
    overflow-x:hidden;
}

.container{
    width:90%;
    max-width:420px;
    margin:20px auto;
    background:white;
    border-radius:25px;
    padding:20px;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.card{
    background:linear-gradient(135deg,#0066ff,#00bfff);
    color:white;
    border-radius:20px;
    padding:20px;
    margin-bottom:25px;
}

.card h2{
    margin:0;
    font-size:24px;
}

.card-number{
    margin:25px 0;
    letter-spacing:3px;
    font-size:20px;
}

.card-bottom{
    display:flex;
    justify-content:space-between;
}

h3{
    margin-bottom:15px;
}

input, select{
    width:100%;
    padding:14px;
    margin-bottom:15px;
    border:none;
    background:#f3f3f3;
    border-radius:12px;
    font-size:15px;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:15px;
    background:orange;
    color:white;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}

#confirmBox{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    justify-content:center;
    align-items:center;
}

.confirm-content{
    background:white;
    width:90%;
    max-width:350px;
    padding:20px;
    border-radius:20px;
    text-align:left;
}

.confirm-content h2{
    text-align:center;
}

.confirm-content button{
    margin-top:10px;
}

#loading{
    display:none;
    text-align:center;
    margin-top:20px;
}

.spinner{
    width:50px;
    height:50px;
    border:5px solid #ddd;
    border-top:5px solid blue;
    border-radius:50%;
    animation:spin 1s linear infinite;
    margin:20px auto;
}

@keyframes spin{
    100%{
        transform:rotate(360deg);
    }
}

#message{
    display:none;
    text-align:center;
    color:red;
    font-weight:bold;
    margin-top:20px;
}

</style>
</head>

<body>

<div class="container">

    <div class="card">

        <h2>Virement Bancaire</h2>

        <div class="card-number">
            **** **** **** 4587
        </div>

        <div class="card-bottom">

            <div>
                Titulaire<br>
                CLIENT
            </div>

            <div>
                VISA
            </div>

        </div>

    </div>

    <h3>Informations du virement</h3>

    <input type="text" id="nom"
    placeholder="Nom du bénéficiaire">

    <input type="text" id="iban"
    placeholder="IBAN">

    <input type="text" id="bic"
    placeholder="Code BIC / SWIFT">

    <input type="number" id="montant"
    placeholder="Montant">

    <select id="devise">

        <option>EUR</option>
        <option>USD</option>
        <option>XOF</option>

    </select>

    <input type="text" id="motif"
    placeholder="Motif du virement">

    <button onclick="valider()">
        VALIDER
    </button>

    <div id="loading">

        <div class="spinner"></div>

        <p>
            Traitement du virement...
        </p>

    </div>

    <div id="message">

        Transaction non finalisée.
        Veuillez réessayer plus tard.

    </div>

</div>

<div id="confirmBox">

    <div class="confirm-content">

        <h2>Confirmation</h2>

        <p>
            <b>Bénéficiaire :</b>
            <span id="cNom"></span>
        </p>

        <p>
            <b>IBAN :</b>
            <span id="cIban"></span>
        </p>

        <p>
            <b>BIC/SWIFT :</b>
            <span id="cBic"></span>
        </p>

        <p>
            <b>Montant :</b>
            <span id="cMontant"></span>
        </p>

        <p>
            <b>Devise :</b>
            <span id="cDevise"></span>
        </p>

        <p>
            <b>Motif :</b>
            <span id="cMotif"></span>
        </p>

        <button onclick="continuer()">
            CONTINUER
        </button>

    </div>

</div>

<script>

function valider(){

    document.getElementById("cNom").innerText =
    document.getElementById("nom").value;

    document.getElementById("cIban").innerText =
    document.getElementById("iban").value;

    document.getElementById("cBic").innerText =
    document.getElementById("bic").value;

    document.getElementById("cMontant").innerText =
    document.getElementById("montant").value;

    document.getElementById("cDevise").innerText =
    document.getElementById("devise").value;

    document.getElementById("cMotif").innerText =
    document.getElementById("motif").value;

    document.getElementById("confirmBox").style.display =
    "flex";
}

function continuer(){

    document.getElementById("confirmBox").style.display =
    "none";

    document.getElementById("loading").style.display =
    "block";

    setTimeout(function(){

        document.getElementById("loading").style.display =
        "none";

        document.getElementById("message").style.display =
        "block";

    },15000);

}

</script>

</body>
</html>
