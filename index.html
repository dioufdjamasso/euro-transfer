<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Interface Bancaire</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f2f2f2;
}

/* HAUT BLEU */

.top{
    width:100%;
    height:180px;
    background:#13388f;
}

/* CARTE */

.card{
    width:90%;
    max-width:500px;
    background:white;
    margin:-80px auto 20px;
    border-radius:20px;
    padding:25px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.account-name{
    font-size:32px;
    font-weight:bold;
    color:#102f7a;
}

.balance{
    font-size:55px;
    color:#39cfff;
    margin-top:20px;
    font-weight:bold;
}

.available{
    margin-top:15px;
    color:#555;
    font-size:22px;
}

/* FORMULAIRE */

.form{
    width:90%;
    max-width:500px;
    margin:20px auto;
}

input,select{
    width:100%;
    padding:15px;
    margin-bottom:15px;
    border:none;
    border-radius:12px;
    background:white;
    font-size:18px;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#13388f;
    color:white;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

/* CONFIRMATION */

#confirmBox{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
    justify-content:center;
    align-items:center;
}

.confirm-content{
    width:90%;
    max-width:400px;
    background:white;
    padding:25px;
    border-radius:20px;
}

.confirm-content h2{
    margin-bottom:20px;
}

/* LOADING */

#loading{
    display:none;
    text-align:center;
    margin-top:30px;
}

.spinner{
    width:60px;
    height:60px;
    border:6px solid #ddd;
    border-top:6px solid #13388f;
    border-radius:50%;
    animation:spin 1s linear infinite;
    margin:20px auto;
}

@keyframes spin{

100%{
transform:rotate(360deg);
}

}

#message{
    display:none;
    text-align:center;
    color:red;
    font-size:20px;
    margin-top:20px;
    font-weight:bold;
}

</style>
</head>

<body>

<!-- BARRE BLEUE -->

<div class="top"></div>

<!-- SURFACE PRINCIPALE -->

<div class="card">

    <div class="account-name" id="name">
        Conto Mediolanum
    </div>

    <div class="balance" id="money">
        45.473,92 €
    </div>

    <div class="available">
        Solde disponible
    </div>

</div>

<!-- MODIFICATION -->

<div class="form">

    <input type="text"
    id="newName"
    placeholder="Modifier le nom">

    <input type="text"
    id="newMoney"
    placeholder="Modifier le montant">

    <button onclick="modifier()">
        MODIFIER
    </button>

</div>

<!-- INFORMATIONS -->

<div class="form">

    <input type="text"
    id="benef"
    placeholder="Nom du bénéficiaire">

    <input type="text"
    id="iban"
    placeholder="IBAN">

    <input type="text"
    id="swift"
    placeholder="Code BIC / SWIFT">

    <input type="number"
    id="amount"
    placeholder="Montant">

    <select id="currency">

        <option>EUR</option>
        <option>USD</option>
        <option>XOF</option>

    </select>

    <input type="text"
    id="motif"
    placeholder="Motif du virement">

    <button onclick="valider()">
        VALIDER
    </button>

</div>

<!-- CONFIRMATION -->

<div id="confirmBox">

<div class="confirm-content">

<h2>Confirmation</h2>

<p>
<b>Bénéficiaire :</b>
<span id="cBenef"></span>
</p>

<br>

<p>
<b>IBAN :</b>
<span id="cIban"></span>
</p>

<br>

<p>
<b>BIC/SWIFT :</b>
<span id="cSwift"></span>
</p>

<br>

<p>
<b>Montant :</b>
<span id="cAmount"></span>
</p>

<br>

<p>
<b>Devise :</b>
<span id="cCurrency"></span>
</p>

<br>

<p>
<b>Motif :</b>
<span id="cMotif"></span>
</p>

<br>

<button onclick="continuer()">
CONTINUER
</button>

</div>

</div>

<!-- LOADING -->

<div id="loading">

<div class="spinner"></div>

<p>
Traitement du virement...
</p>

</div>

<div id="message">

Transaction non finalisée.
Veuillez réessayer plus tard.

</div>

<script>

/* MODIFIER NOM ET SOLDE */

function modifier(){

let nom =
document.getElementById("newName").value;

let montant =
document.getElementById("newMoney").value;

if(nom !== ""){

document.getElementById("name").innerText =
nom;

}

if(montant !== ""){

document.getElementById("money").innerText =
montant;

}

}

/* VALIDATION */

function valider(){

document.getElementById("cBenef").innerText =
document.getElementById("benef").value;

document.getElementById("cIban").innerText =
document.getElementById("iban").value;

document.getElementById("cSwift").innerText =
document.getElementById("swift").value;

document.getElementById("cAmount").innerText =
document.getElementById("amount").value;

document.getElementById("cCurrency").innerText =
document.getElementById("currency").value;

document.getElementById("cMotif").innerText =
document.getElementById("motif").value;

document.getElementById("confirmBox").style.display =
"flex";

}

/* CONTINUER */

function continuer(){

document.getElementById("confirmBox").style.display =
"none";

document.getElementById("loading").style.display =
"block";

setTimeout(function(){

document.getElementById("loading").style.display =
"none";

document.getElementById("message").style.display =
"block";

},15000);

}

</script>

</body>
</html>
