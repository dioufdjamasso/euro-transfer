<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demo Multilingue</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#eef2f7;
padding:20px;
}

/* BOITE */

.box{
max-width:390px;
margin:auto;
background:white;
border-radius:24px;
padding:24px;
box-shadow:0 8px 25px rgba(0,0,0,0.08);
}

/* HAUT */

.top{
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:22px;
font-weight:bold;
color:#173c96;
}

.status{
background:#e8f7ec;
color:#16a34a;
padding:6px 12px;
border-radius:20px;
font-size:13px;
}

/* SOLDE */

.balance-title{
margin-top:25px;
color:#666;
font-size:15px;
}

.balance{
font-size:42px;
font-weight:bold;
margin-top:8px;
color:#111;
}

/* FORMULAIRE */

.form{
margin-top:30px;
}

input,select,button{

width:100%;
padding:14px;
margin-bottom:15px;
border:none;
border-radius:14px;
font-size:15px;

}

input,select{
background:#f3f5f9;
}

button{
background:#173c96;
color:white;
font-weight:bold;
cursor:pointer;
}

/* PAGES */

#loginPage{
display:none;
}

#platform{
display:none;
}

/* LOADING */

#loading{
display:none;
text-align:center;
margin-top:20px;
}

.spinner{
width:50px;
height:50px;
border:5px solid #ddd;
border-top:5px solid #173c96;
border-radius:50%;
animation:spin 1s linear infinite;
margin:20px auto;
}

@keyframes spin{
100%{
transform:rotate(360deg);
}
}

</style>
</head>

<body>

<!-- CHOIX PAYS -->

<div class="box" id="countryPage">

<h2 id="chooseText">
Choisissez votre pays
</h2>

<br>

<select id="country">

<option value="fr">France</option>
<option value="it">Italie</option>
<option value="de">Allemagne</option>
<option value="es">Espagne</option>
<option value="ro">Roumanie</option>
<option value="gr">Grèce</option>
<option value="md">Moldavie</option>

</select>

<button onclick="continuerPays()" id="continueBtn">
CONTINUER
</button>

</div>

<!-- PAGE CODE DEMO -->

<div class="box" id="loginPage">

<h2 id="pinTitle">
Code démo
</h2>

<br>

<input type="password"
id="pinInput"
placeholder="Entrez le code démo">

<button onclick="verifierPin()" id="validateBtn">
VALIDER
</button>

</div>

<!-- TABLEAU -->

<div class="box" id="platform">

<div class="top">

<div class="logo" id="name">
Compte Premium
</div>

<div class="status" id="statusText">
Actif
</div>

</div>

<div class="balance-title" id="balanceText">
Solde disponible
</div>

<div class="balance" id="money">
45.473,92 €
</div>

<!-- FORMULAIRE -->

<div class="form">

<input type="text"
id="benef"
placeholder="Nom du bénéficiaire">

<input type="text"
id="iban"
placeholder="IBAN">

<input type="text"
id="swift"
placeholder="Code BIC / SWIFT">

<input type="number"
id="amount"
placeholder="Montant">

<select id="currency">

<option>EUR</option>
<option>USD</option>
<option>XOF</option>

</select>

<input type="text"
id="motif"
placeholder="Motif du virement">

<button onclick="valider()" id="validateTransfer">
VALIDER
</button>

</div>

</div>

<!-- LOADING -->

<div id="loading">

<div class="spinner"></div>

<p id="loadingText">
Traitement...
</p>

</div>

<script>

/* MODIFIER PAR LE LIEN */

const params =
new URLSearchParams(window.location.search);

const nom =
params.get("nom");

const solde =
params.get("solde");

if(nom){

document.getElementById("name").innerText =
nom;

}

if(solde){

document.getElementById("money").innerText =
solde;

}

/* LANGUES */

let lang = "fr";

const texts = {

fr:{
choose:"Choisissez votre pays",
continue:"CONTINUER",
pin:"Code démo",
placeholder:"Entrez le code démo",
validate:"VALIDER",
platform:"Compte Premium",
balance:"Solde disponible",
status:"Actif",
loading:"Traitement...",
success:"Démo terminée"
},

it:{
choose:"Scegli il tuo paese",
continue:"CONTINUA",
pin:"Codice demo",
placeholder:"Inserisci il codice demo",
validate:"CONFERMA",
platform:"Conto Premium",
balance:"Saldo disponibile",
status:"Attivo",
loading:"Elaborazione...",
success:"Demo completata"
},

de:{
choose:"Wählen Sie Ihr Land",
continue:"WEITER",
pin:"Demo-Code",
placeholder:"Demo-Code eingeben",
validate:"BESTÄTIGEN",
platform:"Premium Konto",
balance:"Verfügbarer Kontostand",
status:"Aktiv",
loading:"Verarbeitung...",
success:"Demo abgeschlossen"
},

es:{
choose:"Seleccione su país",
continue:"CONTINUAR",
pin:"Código demo",
placeholder:"Ingrese el código demo",
validate:"VALIDAR",
platform:"Cuenta Premium",
balance:"Saldo disponible",
status:"Activo",
loading:"Procesando...",
success:"Demostración terminada"
},

ro:{
choose:"Alegeți țara",
continue:"CONTINUĂ",
pin:"Cod demo",
placeholder:"Introduceți codul demo",
validate:"VALIDARE",
platform:"Cont Premium",
balance:"Sold disponibil",
status:"Activ",
loading:"Procesare...",
success:"Demo finalizată"
},

gr:{
choose:"Επιλέξτε τη χώρα σας",
continue:"ΣΥΝΕΧΕΙΑ",
pin:"Κωδικός demo",
placeholder:"Εισαγάγετε demo κωδικό",
validate:"ΕΠΙΒΕΒΑΙΩΣΗ",
platform:"Premium Λογαριασμός",
balance:"Διαθέσιμο υπόλοιπο",
status:"Ενεργό",
loading:"Επεξεργασία...",
success:"Η δοκιμή ολοκληρώθηκε"
},

md:{
choose:"Alegeți țara",
continue:"CONTINUĂ",
pin:"Cod demo",
placeholder:"Introduceți codul demo",
validate:"VALIDARE",
platform:"Cont Premium",
balance:"Sold disponibil",
status:"Activ",
loading:"Procesare...",
success:"Demo finalizată"
}

};

/* CHOIX PAYS */

function continuerPays(){

lang =
document.getElementById("country").value;

document.getElementById("countryPage").style.display =
"none";

document.getElementById("loginPage").style.display =
"block";

document.getElementById("pinTitle").innerText =
texts[lang].pin;

document.getElementById("pinInput").placeholder =
texts[lang].placeholder;

document.getElementById("validateBtn").innerText =
texts[lang].validate;

}

/* CODE DEMO */

function verifierPin(){

const code =
document.getElementById("pinInput").value;

if(code === "123456"){

document.getElementById("loginPage").style.display =
"none";

document.getElementById("platform").style.display =
"block";

document.getElementById("name").innerText =
texts[lang].platform;

document.getElementById("balanceText").innerText =
texts[lang].balance;

document.getElementById("statusText").innerText =
texts[lang].status;

}else{

alert("Code incorrect");

}

}

/* VALIDER */

function valider(){

document.getElementById("platform").style.display =
"none";

document.getElementById("loading").style.display =
"block";

document.getElementById("loadingText").innerText =
texts[lang].loading;

setTimeout(function(){

document.getElementById("loadingText").innerText =
texts[lang].success;

},5000);

}

</script>

</body>
</html>
